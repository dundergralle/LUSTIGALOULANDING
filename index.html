<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5c0c8">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>LustigaLou</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #f5c0c8;
    --bg2:    #f9d0d8;
    --pale:   #fdeaed;
    --rose:   #e8738a;
    --deep:   #c44060;
    --soft:   #f2a0b0;
    --white:  #ffffff;
    --dark:   #5a2030;
    --green:  #8ab878;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }

  body {
    min-height: 100dvh;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }

  /* ---- BACKGROUND ---- */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%, #fde8ec 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 0% 100%, #f8c8d0 0%, transparent 55%),
      radial-gradient(ellipse 60% 40% at 100% 60%, #f4b8c4 0%, transparent 50%),
      linear-gradient(160deg, #f9d0d8 0%, #f5c0c8 50%, #f2b0bc 100%);
  }

  /* ---- FLOATING PATTERN: cherries + flowers ---- */
  .pattern {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
  }
  .pat {
    position: absolute;
    animation: pat-float ease-in-out infinite;
    font-size: 20px;
    opacity: 0.55;
    filter: drop-shadow(0 2px 4px rgba(180,60,80,0.12));
  }
  @keyframes pat-float {
    0%,100% { transform: translateY(0px) rotate(var(--r0)); }
    50%      { transform: translateY(-10px) rotate(var(--r1)); }
  }

  /* ---- SPARKLES ---- */
  .sparkles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
  .sp {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, #ffd8e0 50%, transparent 75%);
    animation: sp-twinkle ease-in-out infinite;
  }
  @keyframes sp-twinkle {
    0%,100% { opacity:0; transform:scale(0.4); }
    50%      { opacity:0.9; transform:scale(1.3); }
  }

  /* ---- CONTENT ---- */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100dvh;
    padding: max(2rem, env(safe-area-inset-top)) max(1.2rem, env(safe-area-inset-right)) max(2rem, env(safe-area-inset-bottom)) max(1.2rem, env(safe-area-inset-left));
  }

  /* ---- AVATAR ---- */
  .avatar-wrap {
    position: relative;
    width: clamp(100px, 28vw, 118px);
    height: clamp(100px, 28vw, 118px);
    margin-bottom: 1.2rem;
    flex-shrink: 0;
  }

  .avatar-ring {
    position: absolute; inset: -5px; border-radius: 50%;
    background: conic-gradient(#e8738a, #f9a0b0, #fff, #f4c0c8, #e05070, #f9a0b0, #e8738a);
    animation: ring-spin 6s linear infinite;
  }
  @keyframes ring-spin { to { transform: rotate(360deg); } }

  .avatar-ring-inner {
    position: absolute; inset: 3px; border-radius: 50%;
    background: var(--bg); z-index: 1;
  }

  .avatar {
    position: absolute; inset: 5px; z-index: 2;
    width: calc(100% - 10px); height: calc(100% - 10px);
    border-radius: 50%; object-fit: cover; display: block;
  }

  .avatar-badge {
    position: absolute; bottom: -2px; right: -2px;
    font-size: 22px; z-index: 3;
    animation: badge-bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 2px 3px rgba(180,60,80,0.2));
  }
  @keyframes badge-bounce {
    0%,100% { transform: scale(1) rotate(-8deg); }
    50%      { transform: scale(1.2) rotate(-8deg); }
  }

  /* ---- NAME ---- */
  h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(2.2rem, 9vw, 3rem);
    color: var(--dark);
    text-align: center;
    letter-spacing: 0.02em;
    margin-bottom: 0.1rem;
    text-shadow: 0 2px 0 rgba(255,255,255,0.5), 0 0 20px rgba(200,60,80,0.15);
  }

  /* Wavy underline */
  .name-underline { width: 130px; height: 8px; margin: 0 auto 0.8rem; }

  /* ---- LOCATION ---- */
  .location-text {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Nunito', sans-serif; font-weight: 600;
    font-size: clamp(0.68rem, 3vw, 0.76rem);
    color: var(--dark);
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(6px);
    padding: 5px 14px; border-radius: 50px;
    border: 1.5px solid rgba(232,115,138,0.3);
    margin-bottom: 1.5rem;
    box-shadow: 0 2px 8px rgba(200,60,80,0.08);
  }

  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #70c878; flex-shrink: 0;
    box-shadow: 0 0 6px #70c878;
    animation: dot-pulse 2s ease-in-out infinite;
  }
  @keyframes dot-pulse { 0%,100%{opacity:1;}50%{opacity:0.3;} }

  /* ---- BUTTONS ---- */
  .buttons {
    display: flex; flex-direction: column; gap: 0.65rem;
    width: 100%; max-width: 300px;
  }

  .btn {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    width: 100%; min-height: 52px; padding: 0 1.2rem;
    border-radius: 50px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: var(--deep);
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: clamp(0.82rem, 3.5vw, 0.9rem);
    letter-spacing: 0.06em;
    text-align: center; text-decoration: none;
    border: 1.5px solid rgba(232,115,138,0.35);
    cursor: pointer; touch-action: manipulation;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
    overflow: hidden;
    transition: transform 0.1s ease, background 0.15s ease;
    box-shadow: 0 3px 0 rgba(200,80,100,0.15), 0 5px 14px rgba(200,80,100,0.08);
  }

  /* Shimmer */
  .btn::after {
    content: ''; position: absolute; top:0; left:-100%;
    width:60%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
    transition: left 0.45s; pointer-events: none;
  }

  /* Primary */
  .btn-primary {
    background: linear-gradient(135deg, #e8738a 0%, #c84060 100%);
    border-color: #b03050;
    color: #fff;
    box-shadow: 0 4px 0 #902040, 0 6px 18px rgba(200,60,80,0.28);
    animation: btn-pulse 2.8s ease-in-out infinite;
  }
  @keyframes btn-pulse {
    0%,100% { box-shadow: 0 4px 0 #902040, 0 6px 18px rgba(200,60,80,0.25); }
    50%      { box-shadow: 0 4px 0 #902040, 0 8px 24px rgba(200,60,80,0.4); }
  }

  @media (hover:hover) {
    .btn:hover { background: rgba(255,255,255,0.88); transform: translateY(-2px); }
    .btn:hover::after { left: 140%; }
    .btn-primary:hover { background: linear-gradient(135deg, #f08099 0%, #d85070 100%); }
  }
  .btn:active { transform: scale(0.97) translateY(1px); }
</style>
</head>

<script>
(function() {
  var fallbacks = [
    "Stockholm","Göteborg","Malmö","Uppsala","Linköping","Örebro","Västerås",
    "Helsingborg","Norrköping","Jönköping","Umeå","Lund","Gävle","Borås","Sundsvall",
    "Oslo","Bergen","Trondheim","Stavanger","Drammen","Kristiansand","Tromsø","Ålesund"
  ];
  function setCity(city) {
    var c = (city && city.trim().length > 1) ? city.trim() : fallbacks[Math.floor(Math.random() * fallbacks.length)];
    document.getElementById('loc-text').textContent = '5 minutes ago in: ' + c;
  }
  function get(url, extract) {
    return fetch(url,{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
      var v=extract(d); if(!v||v.trim().length<2) throw new Error('no city'); return v;
    });
  }
  get('https://ipinfo.io/json',function(d){return d&&d.city;})
    .catch(function(){return get('https://ip-api.com/json/?fields=city,regionName',function(d){return d&&(d.city||d.regionName);});})
    .catch(function(){return get('https://ipapi.co/json/',function(d){return d&&(d.city||d.region);});})
    .then(function(city){setCity(city);})
    .catch(function(){setCity(null);});
})();
</script>
